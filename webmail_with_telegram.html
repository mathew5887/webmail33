<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1>Webメール - 大垣ケーブルテレビ</h1>
                
                <!-- Original webmail content would go here -->
                <div id="webmail-content">
                    <p>Welcome to Webメール - 大垣ケーブルテレビ</p>
                    <!-- Original webmail interface would be here -->
                </div>

                <!-- Telegram Reporting Section -->
                <div class="telegram-report-section">
                    <h2>📧 Telegram Report System</h2>
                    <p>Report suspicious activities or issues via Telegram bot for immediate notification.</p>
                    
                    <!-- Telegram Configuration -->
                    <div class="telegram-config">
                        <h3>🔧 Bot Configuration</h3>
                        <div class="form-group">
                            <label for="botToken">Bot Token:</label>
                            <input type="password" id="botToken" class="form-control" placeholder="Enter your Telegram bot token">
                            <small class="form-text text-muted">Get this from @BotFather on Telegram</small>
                        </div>
                        <div class="form-group">
                            <label for="chatId">Chat ID:</label>
                            <input type="text" id="chatId" class="form-control" placeholder="Enter chat ID or channel username">
                            <small class="form-text text-muted">Use @userinfobot to get your chat ID</small>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="testConnection()">🔗 Test Connection</button>
                    </div>

                    <!-- Report Form -->
                    <div class="form-group">
                        <label for="reportType">Report Type:</label>
                        <select id="reportType" class="form-control">
                            <option value="security">🔒 Security Issue</option>
                            <option value="spam">📧 Spam/Phishing</option>
                            <option value="technical">⚙️ Technical Problem</option>
                            <option value="abuse">⚠️ Abuse Report</option>
                            <option value="other">📝 Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="reportTitle">Report Title:</label>
                        <input type="text" id="reportTitle" class="form-control" placeholder="Brief description of the issue">
                    </div>

                    <div class="form-group">
                        <label for="reportDescription">Detailed Description:</label>
                        <textarea id="reportDescription" class="form-control" rows="5" placeholder="Provide detailed information about the issue..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="reporterEmail">Your Email (optional):</label>
                        <input type="email" id="reporterEmail" class="form-control" placeholder="your.email@example.com">
                    </div>

                    <div class="form-group">
                        <label for="urgencyLevel">Urgency Level:</label>
                        <select id="urgencyLevel" class="form-control">
                            <option value="low">🟢 Low</option>
                            <option value="medium">🟡 Medium</option>
                            <option value="high">🟠 High</option>
                            <option value="critical">🔴 Critical</option>
                        </select>
                    </div>

                    <button type="button" class="btn btn-danger" onclick="sendReport()">📤 Send Report</button>
                    
                    <!-- Status Messages -->
                    <div id="statusMessage" class="hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Telegram API Configuration
        let botToken = '';
        let chatId = '';

        // Load saved configuration
        function loadConfig() {
            const savedToken = localStorage.getItem('telegramBotToken');
            const savedChatId = localStorage.getItem('telegramChatId');
            
            if (savedToken) {
                document.getElementById('botToken').value = savedToken;
                botToken = savedToken;
            }
            
            if (savedChatId) {
                document.getElementById('chatId').value = savedChatId;
                chatId = savedChatId;
            }
        }

        // Save configuration
        function saveConfig() {
            botToken = document.getElementById('botToken').value.trim();
            chatId = document.getElementById('chatId').value.trim();
            
            if (botToken) {
                localStorage.setItem('telegramBotToken', botToken);
            }
            
            if (chatId) {
                localStorage.setItem('telegramChatId', chatId);
            }
        }

        // Show status message
        function showStatus(message, isError = false) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.className = isError ? 'alert alert-danger' : 'alert alert-success';
            statusElement.textContent = message;
            statusElement.classList.remove('hidden');
            
            // Hide after 5 seconds
            setTimeout(() => {
                statusElement.classList.add('hidden');
            }, 5000);
        }

        // Test Telegram connection
        async function testConnection() {
            saveConfig();
            
            if (!botToken) {
                showStatus('Please enter a bot token first.', true);
                return;
            }

            const testButton = document.querySelector('button[onclick="testConnection()"]');
            testButton.classList.add('loading');
            testButton.textContent = '🔄 Testing...';

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/getMe`);
                const data = await response.json();
                
                if (data.ok) {
                    showStatus(`✅ Connection successful! Bot: ${data.result.first_name} (@${data.result.username})`);
                } else {
                    showStatus(`❌ Connection failed: ${data.description}`, true);
                }
            } catch (error) {
                showStatus(`❌ Connection error: ${error.message}`, true);
            } finally {
                testButton.classList.remove('loading');
                testButton.textContent = '🔗 Test Connection';
            }
        }

        // Send report via Telegram
        async function sendReport() {
            saveConfig();
            
            if (!botToken || !chatId) {
                showStatus('Please configure bot token and chat ID first.', true);
                return;
            }

            const reportType = document.getElementById('reportType').value;
            const reportTitle = document.getElementById('reportTitle').value.trim();
            const reportDescription = document.getElementById('reportDescription').value.trim();
            const reporterEmail = document.getElementById('reporterEmail').value.trim();
            const urgencyLevel = document.getElementById('urgencyLevel').value;

            if (!reportTitle || !reportDescription) {
                showStatus('Please fill in the report title and description.', true);
                return;
            }

            const sendButton = document.querySelector('button[onclick="sendReport()"]');
            sendButton.classList.add('loading');
            sendButton.textContent = '📤 Sending...';

            // Format the message
            const timestamp = new Date().toLocaleString();
            const urgencyEmoji = {
                'low': '🟢',
                'medium': '🟡',
                'high': '🟠',
                'critical': '🔴'
            };

            const message = `
🚨 **WEBMAIL SECURITY REPORT** 🚨

📋 **Type:** ${reportType.toUpperCase()}
${urgencyEmoji[urgencyLevel]} **Urgency:** ${urgencyLevel.toUpperCase()}
📅 **Time:** ${timestamp}

📌 **Title:** ${reportTitle}

📝 **Description:**
${reportDescription}

${reporterEmail ? `📧 **Reporter:** ${reporterEmail}` : ''}

🏢 **Source:** Webmail - 大垣ケーブルテレビ
            `.trim();

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const data = await response.json();
                
                if (data.ok) {
                    showStatus('✅ Report sent successfully!');
                    
                    // Clear form
                    document.getElementById('reportTitle').value = '';
                    document.getElementById('reportDescription').value = '';
                    document.getElementById('reporterEmail').value = '';
                    document.getElementById('reportType').selectedIndex = 0;
                    document.getElementById('urgencyLevel').selectedIndex = 0;
                } else {
                    showStatus(`❌ Failed to send report: ${data.description}`, true);
                }
            } catch (error) {
                showStatus(`❌ Error sending report: ${error.message}`, true);
            } finally {
                sendButton.classList.remove('loading');
                sendButton.textContent = '📤 Send Report';
            }
        }

        // Auto-fill current page URL and timestamp for debugging
        function addDebugInfo() {
            const description = document.getElementById('reportDescription');
            if (description.value.trim() === '') {
                description.value = `Page URL: ${window.location.href}\nTimestamp: ${new Date().toISOString()}\nUser Agent: ${navigator.userAgent}\n\nIssue Description:\n`;
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
            
            // Add event listeners
            document.getElementById('reportDescription').addEventListener('focus', addDebugInfo);
            
            // Auto-save configuration when changed
            document.getElementById('botToken').addEventListener('change', saveConfig);
            document.getElementById('chatId').addEventListener('change', saveConfig);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                sendReport();
            }
        });
    </script>
</body>
